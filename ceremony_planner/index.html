<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Ceremony Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="app-container">
        <!-- Floating Dashboard -->
        <aside class="dashboard glass-panel">
            <h1 class="glow-text">Ceremony Planner</h1>
            
            <div class="goal-selector">
                <label for="goalDropdown">Target Milestone:</label>
                <select id="goalDropdown">
                    <option value="4000">4,000 Drops</option>
                    <option value="5400">5,400 Drops</option>
                    <option value="6600">6,600 Drops</option>
                    <option value="8300" selected>8,300 Drops</option>
                </select>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">Tasks & Chests Drops</span>
                    <span class="stat-value text-accent" id="totalTasksDrops">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Missing Drops for Goal</span>
                    <span class="stat-value text-warning" id="missingDrops">0</span>
                </div>
                <div class="stat-box highlight-box">
                    <span class="stat-label">Daily Monster Drops Needed</span>
                    <span class="stat-value text-success" id="dailyMonsterDrops">0</span>
                </div>
            </div>

            <div class="buff-container" id="buffContainer" style="display: none;">
                <label class="task-item">
                    <input type="checkbox" id="buff5400" value="150">
                    <div class="custom-checkbox"></div>
                    <div class="task-content">
                        <span class="task-desc">5400 Buff</span>
                        <span class="task-drops">+150 Drops</span>
                    </div>
                </label>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text">
                    <span id="progressText">0 / 8300</span>
                </div>
            </div>
            
            <p class="dashboard-hint">
                Check off the tasks you plan to complete. We assume all 7 days of monster hunting.
            </p>
        </aside>

        <!-- Main Content Area -->
        <main class="content-area">
            
            <p class="instruction-text">Select the tasks you plan to complete below to automatically calculate your required monster drops.</p>

            <div class="tabs-container">
                <button class="tab-btn active" data-tab="daily">Daily Tasks</button>
                <button class="tab-btn" data-tab="milestone">Ceremony Tasks</button>
            </div>

            <!-- Daily Tasks View -->
            <div id="dailyView" class="tab-content active">
                <div class="day-selector-container">
                    <label for="dayDropdown">Select Day:</label>
                    <select id="dayDropdown">
                        <option value="1" selected>Day 1</option>
                        <option value="2">Day 2</option>
                        <option value="3">Day 3</option>
                        <option value="4">Day 4</option>
                        <option value="5">Day 5</option>
                        <option value="6">Day 6</option>
                        <option value="7">Day 7</option>
                    </select>
                </div>
                <div class="days-grid" id="daysGrid">
                    <!-- JS will populate the days -->
                </div>
            </div>

            <!-- Milestone Tasks View -->
            <div id="milestoneView" class="tab-content">
                <div class="milestones-grid" id="milestonesGrid">
                    <!-- JS will populate milestone categories -->
                </div>
            </div>
            
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
